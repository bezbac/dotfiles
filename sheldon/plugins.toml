# Sheldon configuration file
#
# See https://sheldon.cli.rs

shell = "zsh"

[templates]
defer = """{{ hooks?.pre | nl }}{% for file in files %}zsh-defer source "{{ file }}"\n{% endfor %}{{ hooks?.post | nl }}"""

# Sourced
# ----------------

[plugins.zsh-defer]
github = "romkatv/zsh-defer"

[plugins.edit-command-line]
inline = "autoload -Uz edit-command-line && zle -N edit-command-line"

# Deferred plugins
# ----------------

[plugins.path]
local = "~/.zsh/plugins"
apply = ["defer"]

[plugins.aliases]
local = "~/.zsh/plugins"
apply = ["defer"]

[plugins.compinit]
local = "~/.zsh/plugins"
apply = ["defer"]

[plugins.zsh-history-substring-search]
github = "zsh-users/zsh-history-substring-search"
use = ["{{ name }}.zsh"]
apply = ["defer"]

[plugins.zsh-auto-notify]
github = "MichaelAquilina/zsh-auto-notify"
use = ["auto-notify.plugin.zsh"]
apply = ["defer"]

[plugins.fast-syntax-highlighting]
github = "zdharma-continuum/fast-syntax-highlighting"
apply = ["defer"]

[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"
use = ["{{ name }}.zsh"]
apply = ["defer"]

[plugins.zellij-tabula]
github = "bezbac/zellij-tabula"
use = ["{{ name }}.plugin.zsh"]
tag = "v0.2.0"
apply = ["defer"]

[plugins.sdkman]
local = "~/.zsh/plugins"
apply = ["defer"]

[plugins.pyenv]
local = "~/.zsh/plugins"
apply = ["defer"]

[plugins.worktrunk]
local = "~/.zsh/plugins"
apply = ["defer"]

[plugins.proto]
local = "~/.zsh/plugins"
apply = ["defer"]

# Make sure nvm is loaded after proto
# This way, the default node version will be managed by nvm
# While proto will activate node versions per project as needed
[plugins.nvm]
local = "~/.zsh/plugins"
apply = ["defer"]
